<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Organizador da Rotina do Trabalhador</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(135deg,#3498db,#2ecc71);
min-height:100vh;
padding:20px;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
width:100%;
max-width:700px;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
text-align:center;
color:#2c3e50;
margin-bottom:10px;
}

.subtitulo{
text-align:center;
color:#666;
margin-bottom:25px;
}

.info{
background:#ecf0f1;
padding:15px;
border-radius:10px;
margin-bottom:20px;
font-size:14px;
}

label{
display:block;
margin-top:12px;
font-weight:bold;
color:#2c3e50;
}

input{
width:100%;
padding:12px;
margin-top:5px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:20px;
background:#3498db;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#2980b9;
}

#resultado{
margin-top:25px;
padding:20px;
background:#f8f9fa;
border-left:6px solid #3498db;
border-radius:10px;
line-height:1.8;
display:none;
}

.mensagem{
margin-top:15px;
padding:12px;
background:#dff9fb;
border-radius:8px;
font-style:italic;
}

.rodape{
text-align:center;
margin-top:20px;
color:#777;
font-size:13px;
}

</style>
</head>

<body>

<div class="container">

<h1>📅 Organizador da Rotina do Trabalhador</h1>

<p class="subtitulo">
Planejando o presente para construir o futuro
</p>

<div class="info">
Projeto desenvolvido pelos alunos do EJATEC para auxiliar trabalhadores e estudantes na organização da rotina diária.
</div>

<label>Nome</label>
<input type="text" id="nome">

<label>Horas de Trabalho</label>
<input type="number" id="trabalho" min="0" max="24">

<label>Horas de Estudo</label>
<input type="number" id="estudo" min="0" max="24">

<label>Horas Livres</label>
<input type="number" id="livre" min="0" max="24">

<label>Horas de Sono</label>
<input type="number" id="sono" min="0" max="24">

<button onclick="analisarRotina()">
Analisar Rotina
</button>

<div id="resultado"></div>

<div class="rodape">
Projeto de Aprendizagem Interdisciplinar (PAI) • EJATEC
</div>

</div>

<script>

function analisarRotina(){

let nome = document.getElementById("nome").value;
let trabalho = Number(document.getElementById("trabalho").value);
let estudo = Number(document.getElementById("estudo").value);
let livre = Number(document.getElementById("livre").value);
let sono = Number(document.getElementById("sono").value);

if(nome === ""){
alert("Por favor, informe seu nome.");
return;
}

let total = trabalho + estudo + livre + sono;

let mensagens = [
"Organização é o primeiro passo para alcançar objetivos.",
"Pequenos estudos diários geram grandes resultados.",
"Descansar também faz parte da produtividade.",
"Você está construindo seu futuro através da educação."
];

let mensagemAleatoria =
mensagens[Math.floor(Math.random()*mensagens.length)];

let texto = `
<h2>Olá, ${nome}!</h2>

<h3>Resumo da sua rotina</h3>

📌 Trabalho: ${trabalho} horas<br>
📌 Estudo: ${estudo} horas<br>
📌 Tempo livre: ${livre} horas<br>
📌 Sono: ${sono} horas<br><br>
`;

if(livre >= 2){
texto += "✅ Você possui tempo para descanso e lazer.<br>";
}else{
texto += "⚠️ Tente separar mais tempo para descanso.<br>";
}

if(estudo < 2){
texto += "📚 Sugestão: reserve mais tempo para os estudos.<br>";
}else{
texto += "🎓 Parabéns! Você está dedicando tempo aos estudos.<br>";
}

if(sono < 6){
texto += "😴 Dormir pouco pode prejudicar sua saúde.<br>";
}else{
texto += "💚 Seu tempo de sono está adequado.<br>";
}

if(total > 24){
texto += "<br>❌ Os horários informados ultrapassam 24 horas.<br>";
texto += "Verifique os dados digitados.";
}else{
texto += "<br>✅ Rotina registrada com sucesso!";
}

texto += `
<div class="mensagem">
🌟 ${mensagemAleatoria}
</div>
`;

document.getElementById("resultado").style.display="block";
document.getElementById("resultado").innerHTML = texto;

}

</script>

</body>
</html>
